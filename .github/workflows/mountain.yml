name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1986 }
          - { version: 8212 }
          - { version: 6192 }
          - { version: 4543 }
          - { version: 4338 }
          - { version: 8152 }
          - { version: 7728 }
          - { version: 7799 }
          - { version: 3102 }
          - { version: 8224 }
          - { version: 710 }
          - { version: 9811 }
          - { version: 502 }
